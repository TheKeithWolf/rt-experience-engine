# Royal Tumble — Experience Engine Master Configuration
# All values externalized here — zero magic constants in code.

board:
  num_reels: 7
  num_rows: 7
  min_cluster_size: 5

gravity:
  # (dx, dy) offsets from empty cell to potential donor
  # (0,-1)=directly above, (1,-1)=above-right, (-1,-1)=above-left
  donor_priorities:
    - [0, -1]
    - [1, -1]
    - [-1, -1]
  max_settle_passes: 100

grid_multiplier:
  initial_value: 0
  first_hit_value: 1
  increment: 1
  cap: 100
  minimum_contribution: 1

boosters:
  spawn_thresholds:
    - { booster: "W",   min_size: 7,  max_size: 8 }
    - { booster: "R",   min_size: 9,  max_size: 10 }
    - { booster: "B",   min_size: 11, max_size: 12 }
    - { booster: "LB",  min_size: 13, max_size: 14 }
    - { booster: "SLB", min_size: 15, max_size: 49 }
  spawn_order: ["W", "R", "B", "LB", "SLB"]
  rocket_tie_orientation: "H"
  bomb_blast_radius: 1
  immune_to_rocket: ["W", "S"]
  immune_to_bomb: ["W", "S"]
  chain_initiators: ["R", "B"]

paytable:
  entries:
    # L1 — lowest pay symbol
    - { symbol: "L1", tier_min: 5,  tier_max: 6,  payout: 0.1 }
    - { symbol: "L1", tier_min: 7,  tier_max: 8,  payout: 0.2 }
    - { symbol: "L1", tier_min: 9,  tier_max: 10, payout: 0.5 }
    - { symbol: "L1", tier_min: 11, tier_max: 12, payout: 1.0 }
    - { symbol: "L1", tier_min: 13, tier_max: 14, payout: 2.0 }
    - { symbol: "L1", tier_min: 15, tier_max: 49, payout: 5.0 }
    # L2
    - { symbol: "L2", tier_min: 5,  tier_max: 6,  payout: 0.2 }
    - { symbol: "L2", tier_min: 7,  tier_max: 8,  payout: 0.3 }
    - { symbol: "L2", tier_min: 9,  tier_max: 10, payout: 0.7 }
    - { symbol: "L2", tier_min: 11, tier_max: 12, payout: 1.2 }
    - { symbol: "L2", tier_min: 13, tier_max: 14, payout: 2.5 }
    - { symbol: "L2", tier_min: 15, tier_max: 49, payout: 6.0 }
    # L3
    - { symbol: "L3", tier_min: 5,  tier_max: 6,  payout: 0.3 }
    - { symbol: "L3", tier_min: 7,  tier_max: 8,  payout: 0.4 }
    - { symbol: "L3", tier_min: 9,  tier_max: 10, payout: 0.9 }
    - { symbol: "L3", tier_min: 11, tier_max: 12, payout: 1.4 }
    - { symbol: "L3", tier_min: 13, tier_max: 14, payout: 3.0 }
    - { symbol: "L3", tier_min: 15, tier_max: 49, payout: 7.0 }
    # L4
    - { symbol: "L4", tier_min: 5,  tier_max: 6,  payout: 0.4 }
    - { symbol: "L4", tier_min: 7,  tier_max: 8,  payout: 0.5 }
    - { symbol: "L4", tier_min: 9,  tier_max: 10, payout: 1.1 }
    - { symbol: "L4", tier_min: 11, tier_max: 12, payout: 1.6 }
    - { symbol: "L4", tier_min: 13, tier_max: 14, payout: 3.5 }
    - { symbol: "L4", tier_min: 15, tier_max: 49, payout: 8.0 }
    # H1
    - { symbol: "H1", tier_min: 5,  tier_max: 6,  payout: 0.5 }
    - { symbol: "H1", tier_min: 7,  tier_max: 8,  payout: 1.0 }
    - { symbol: "H1", tier_min: 9,  tier_max: 10, payout: 4.0 }
    - { symbol: "H1", tier_min: 11, tier_max: 12, payout: 8.0 }
    - { symbol: "H1", tier_min: 13, tier_max: 14, payout: 10.0 }
    - { symbol: "H1", tier_min: 15, tier_max: 49, payout: 20.0 }
    # H2
    - { symbol: "H2", tier_min: 5,  tier_max: 6,  payout: 0.7 }
    - { symbol: "H2", tier_min: 7,  tier_max: 8,  payout: 1.5 }
    - { symbol: "H2", tier_min: 9,  tier_max: 10, payout: 6.0 }
    - { symbol: "H2", tier_min: 11, tier_max: 12, payout: 10.0 }
    - { symbol: "H2", tier_min: 13, tier_max: 14, payout: 12.5 }
    - { symbol: "H2", tier_min: 15, tier_max: 49, payout: 22.5 }
    # H3 — highest pay symbol
    - { symbol: "H3", tier_min: 5,  tier_max: 6,  payout: 0.9 }
    - { symbol: "H3", tier_min: 7,  tier_max: 8,  payout: 2.0 }
    - { symbol: "H3", tier_min: 9,  tier_max: 10, payout: 8.0 }
    - { symbol: "H3", tier_min: 11, tier_max: 12, payout: 12.0 }
    - { symbol: "H3", tier_min: 13, tier_max: 14, payout: 15.0 }
    - { symbol: "H3", tier_min: 15, tier_max: 49, payout: 25.0 }

centipayout:
  multiplier: 100
  rounding_base: 10

win_levels:
  tiers:
    - { level: 1,  min_payout: 0.0,    max_payout: 0.1 }
    - { level: 2,  min_payout: 0.1,    max_payout: 1.0 }
    - { level: 3,  min_payout: 1.0,    max_payout: 2.0 }
    - { level: 4,  min_payout: 2.0,    max_payout: 5.0 }
    - { level: 5,  min_payout: 5.0,    max_payout: 10.0 }
    - { level: 6,  min_payout: 10.0,   max_payout: 25.0 }
    - { level: 7,  min_payout: 25.0,   max_payout: 100.0 }
    - { level: 8,  min_payout: 100.0,  max_payout: 2000.0 }
    - { level: 9,  min_payout: 2000.0, max_payout: 5000.0 }
    # Final tier — no upper bound (inf represented as very large number)
    - { level: 10, min_payout: 5000.0, max_payout: .inf }

freespin:
  min_scatters_to_trigger: 4
  max_scatters_on_board: 5
  awards:
    - [4, 10]
    - [5, 10]
  grid_multipliers_persist: true

wincap:
  max_payout: 5000.0
  halt_cascade: true

solvers:
  wfc_max_backtracks: 500
  wfc_min_symbol_weight: 0.01
  csp_max_solve_time_ms: 5000
  asp_max_models: 10
  asp_rand_freq: 0.5
  max_retries_per_instance: 150
  max_construction_retries: 100 
  # Retry generation when validation fails (e.g., terminal board max_component, payout overflow)
  max_validation_retries: 250
  # BoardSymbolNonAdjacency applied for cascade steps 0 through this index —
  # deep steps (3+) have boards too dense for strict non-adjacency enforcement
  board_adjacency_max_step: 2
  # BFS seed retry limit — when frontier exhaustion occurs on fragmented
  # available-sets, retry with a different seed before failing the attempt
  max_seed_retries: 50

diagnostics:
  targets:
    - { metric: "rtp_total", min_value: 0.0, max_value: 5.0 }
    - { metric: "hit_rate", min_value: 0.0, max_value: 1.0 }
    - { metric: "dead_spin_rate", min_value: 0.0, max_value: 1.0 }
    - { metric: "spatial_cv", min_value: null, max_value: 1.0 }
    - { metric: "freespin_trigger_rate", min_value: 0.0, max_value: 1.0 }
    - { metric: "wincap_hit_rate", min_value: 0.0, max_value: 1.0 }

population:
