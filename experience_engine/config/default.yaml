symbols:
  standard: ["L1", "L2", "L3", "L4", "H1", "H2", "H3"]
  low_tier: ["L1", "L2", "L3", "L4"]
  high_tier: ["H1", "H2", "H3"]
  payout_rank:
    L1: 1
    L2: 2
    L3: 3
    L4: 4
    H1: 5
    H2: 6
    H3: 7

anticipation:
  trigger_threshold: 3

output:
  # Zstandard compression for book JSONL files
  compression: false
  # Base output directory (relative to game root)
  output_dir: "games/royal_tumble/experience_engine/library"
  # Multiprocessing worker count — 1 = serial mode
  num_workers: 1
  # Bet mode name — controls file naming (books_{mode}.jsonl, lookUpTable_{mode}.csv)
  mode_name: "base"
  # Post-optimization audit: flag archetypes with survival rate below this threshold
  audit_survival_threshold: 0.10

reasoner:
  # Fraction of max payout budget — below this means "running low" (pacing too slow)
  payout_low_fraction: 0.3
  # Fraction of max payout budget — above this means "running high" (risk of overshoot)
  payout_high_fraction: 0.85
  # Steps of slack before dormant booster arming becomes urgent (0 = must arm immediately)
  arming_urgency_horizon: 1
  # Default max connected component size for terminal dead boards when signature
  # doesn't specify — prevents visible near-cluster groupings on dead spins
  terminal_dead_default_max_component: 4
  # Maximum hypothetical boards a strategy may evaluate per step (computation budget)
  max_forward_simulations_per_step: 10
  # Cap on strategic cells per step intent — prevents over-constraining future steps
  # SeedPlanner typically places 5-15 cells; 16 gives headroom without over-constraining WFC
  max_strategic_cells_per_step: 16
  # How many gravity-settle steps ahead strategies may chain-simulate (1 = immediate only)
  lookahead_depth: 2

# Gravity-aware WFC tuning — controls spatial weight suppression zones
# that prevent unintended post-gravity cluster merges during board filling
gravity_wfc:
  # Zone 1: boundary suppression — how strongly same-tier symbols are suppressed
  # at cells immediately adjacent to the planned cluster (lower = stronger)
  cluster_boundary_tier_suppression: 0.15
  # Zone 2: BFS radius for extended neighborhood (in cells from cluster edge)
  extended_neighborhood_radius: 2
  # Zone 2: suppression multiplier for same-tier symbols in extended neighborhood
  extended_neighborhood_suppression: 0.5
  # Zone 3: suppression for same-tier symbols in columns below the cluster —
  # prevents gravity from compressing same-tier symbols into merges
  compression_column_suppression: 0.7
  # Zone 4: suppression for the seed symbol near strategic cell positions
  strategic_cell_neighbor_suppression: 0.2
  # Absolute floor for spatial weights — prevents zero-probability symbols
  min_symbol_weight: 0.01

# RL Archive — MAP-Elites archive system for deep cascade generation (depth >= 2).
# Entire section is optional — omitting it disables archive generation and
# falls back to the rule-based CascadeInstanceGenerator.
rl_archive:
  # Behavioral descriptor — controls how trajectories are discretized into
  # archive niches. More bins = finer behavioral resolution but sparser coverage.
  descriptor:
    # Board spatial divisions for step-0 cluster centroid binning
    spatial_col_bins: 3
    spatial_row_bins: 3
    # Equal-width payout divisions across the archetype's payout range
    payout_bins: 4

  # Quality scoring — weights for each component of the MAP-Elites quality score.
  # Higher quality instances replace lower-quality ones in the same archive cell.
  # Setting any weight to 0.0 disables that component.
  quality:
    # How close the payout is to the midpoint of the archetype's payout range
    payout_centering_weight: 2.0
    # Fraction of consecutive steps with non-decreasing payout (rising tension)
    escalation_weight: 1.0
    # Mean cluster size relative to board area (rewards larger clusters)
    cluster_size_weight: 0.5
    # Fraction of cascade steps that produce nonzero payout
    productivity_weight: 1.0
    # Fraction of cluster positions on cells with active grid multipliers
    multiplier_engagement_weight: 0.5

  # Cascade environment — controls RL training episode parameters
  environment:
    # Maximum cascade steps per training episode before forced termination
    max_episode_steps: 15
    # Penalty applied when WFC fill fails (episode ends immediately)
    invalid_step_penalty: -1.0
    # Bonus when the completed trajectory satisfies the narrative arc
    completion_bonus: 5.0
    # Penalty when the episode ends without satisfying the arc
    failure_penalty: -3.0
    # Weight for post-transition board feasibility in per-step reward
    feasibility_weight: 0.4
    # Weight for narrative phase progress in per-step reward
    progress_weight: 0.3

  # Reward function — weights for phase-aware per-step reward shaping.
  # Each component adds its weight when the step result matches the
  # current narrative phase's constraints.
  reward:
    # Base reward when the step satisfies the current phase's expectations
    phase_match_reward: 1.0
    # Per-cluster reward when cluster count/size match phase constraints
    cluster_match_reward: 0.5
    # Per-spawn reward when a booster type matches the phase's expected spawns
    spawn_match_reward: 0.5
    # Per-fire reward — higher because fires are rarer and more impactful
    fire_match_reward: 2.0
    # Reward when wild behavior (spawn/bridge/idle) matches the phase
    wild_behavior_match_reward: 0.5
    # Feasibility: how suitable is the post-transition board for the next phase
    feasibility_empty_cell_weight: 0.3
    feasibility_adjacency_weight: 0.7

  # Policy network — architecture parameters for the goal-conditioned cascade policy.
  # Requires PyTorch. Only loaded by train.py, never by run.py.
  policy:
    # Extra non-symbol board channels (multiplier, empty mask, wild mask, booster mask)
    board_channels: 4
    # CNN filter count per convolutional layer
    cnn_filters: 32
    # Number of stacked 3x3 convolutional layers
    cnn_layers: 3
    # Hidden dimension for the shared trunk MLP
    trunk_hidden: 128
    # Embedding dimensions for archetype and phase conditioning
    archetype_embedding_dim: 16
    phase_embedding_dim: 8
    # Entropy bonus coefficient for exploration in PPO
    entropy_coefficient: 0.01

  # Training — PPO hyperparameters, curriculum schedule, and reporter settings.
  # Only used by train.py CLI.
  training:
    learning_rate: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_epsilon: 0.2
    epochs_per_batch: 4
    batch_size: 64
    max_training_episodes: 500000
    checkpoint_interval: 10000
    imitation_epochs: 50
    imitation_batch_size: 256
    # Curriculum phases — difficulty ramps up as training progresses
    curriculum:
      phases:
        - { episode_threshold: 0, difficulty_filter: "standard" }
        - { episode_threshold: 100000, difficulty_filter: "all" }
    # Console reporter — controls verbosity and plateau detection
    reporter:
      completion_rolling_window: 1000
      completion_trend_buckets: 10
      plateau_warn_threshold: 30
      condense_above_completion: 0.90
      report_every_n_batches: 1

  # Generator — production archive sampling for population generation
  generator:
    # Directory where trained archive JSONL files are stored
    archive_dir: "games/royal_tumble/experience_engine/library/archives"
    # Emit a warning if archive coverage is below this threshold
    min_coverage_warn: 0.2

  # Diagnostics — archive health reporting thresholds
  diagnostics:
    # Coverage >= warn → "pass", fail < coverage < warn → "warn", coverage <= fail → "fail"
    coverage_warn_threshold: 0.2
    coverage_fail_threshold: 0.05
