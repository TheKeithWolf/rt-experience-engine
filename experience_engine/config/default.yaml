      t1_near_miss: 1.0
      t1_multi: 1.0
      t1_cascade_1: 1.0
      t1_cascade_2: 1.0
      t1_near_miss_cascade: 1.0
      t1_scatter_2: 1.0
      t1_scatter_3: 1.0
      t1_multi_cascade: 1.0
      t1_cascade_3plus: 1.0
      t1_low_cascade: 1.0
      t1_cascade_scatter_3: 1.0
    wild:
      wild_idle: 1.0
      wild_bridge_small: 1.0
      wild_bridge_large: 1.0
      wild_enable_rocket: 1.0
      wild_enable_bomb: 1.0
      wild_multi: 1.0
      wild_near_miss_single: 1.0
      wild_near_miss_multi: 1.0
      wild_near_miss_high_idle: 1.0
      wild_late_save: 1.0
      wild_late_save_high: 1.0
      wild_storm_low: 1.0
      wild_storm_bridge_chain: 1.0
      wild_scatter_tease: 1.0
      wild_scatter_cascade_tease: 1.0
      wild_escalation_fizzle: 1.0
      wild_rocket_tease: 1.0
    rocket:
      rocket_idle: 1.0
      rocket_h_fire: 1.0
      rocket_v_fire: 1.0
      rocket_fire_dead: 1.0
      rocket_fire_cascade: 1.0
      rocket_chain_rocket: 1.0
      rocket_chain_bomb: 1.0
      rocket_chain_lb: 1.0
      rocket_chain_slb: 1.0
      rocket_dual: 1.0
      rocket_near_miss_spawn: 1.0
      rocket_near_miss_orientation: 1.0
      rocket_near_miss_dual_idle: 1.0
      rocket_late_save: 1.0
      rocket_late_save_chain: 1.0
      rocket_storm_low: 1.0
      rocket_storm_cross: 1.0
      rocket_scatter_tease: 1.0
      rocket_scatter_storm_tease: 1.0
      rocket_escalation_fizzle: 1.0
      rocket_chain_fizzle: 1.0
      rocket_bomb_tease: 1.0
    bomb:
      bomb_idle: 1.0
      bomb_fire: 1.0
      bomb_fire_dead: 1.0
      bomb_chain_rocket: 1.0
      bomb_chain_bomb: 1.0
      bomb_chain_lb: 1.0
      bomb_chain_slb: 1.0
      bomb_multi: 1.0
    lb:
      lb_fire_low: 1.0
      lb_fire_high: 1.0
