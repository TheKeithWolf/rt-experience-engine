      cascade_to_booster_to_cascade: 1.0
      booster_phase_multi: 1.0
    trigger:
      trigger_4s: 1.0
      trigger_4s_with_win: 1.0
      trigger_5s: 1.0
      trigger_5s_with_booster: 1.0
    wincap:
      near_wincap: 1.0
      wincap: 1.0

symbols:
  standard: ["L1", "L2", "L3", "L4", "H1", "H2", "H3"]
  low_tier: ["L1", "L2", "L3", "L4"]
  high_tier: ["H1", "H2", "H3"]
  payout_rank:
    L1: 1
    L2: 2
    L3: 3
    L4: 4
    H1: 5
    H2: 6
    H3: 7

anticipation:
  trigger_threshold: 3

output:
  # Zstandard compression for book JSONL files
  compression: false
  # Base output directory (relative to game root)
  output_dir: "games/royal_tumble/experience_engine/library"
  # Multiprocessing worker count — 1 = serial mode
  num_workers: 1
  # Bet mode name — controls file naming (books_{mode}.jsonl, lookUpTable_{mode}.csv)
  mode_name: "base"
  # Post-optimization audit: flag archetypes with survival rate below this threshold
  audit_survival_threshold: 0.10

reasoner:
  # Fraction of max payout budget — below this means "running low" (pacing too slow)
  payout_low_fraction: 0.3
  # Fraction of max payout budget — above this means "running high" (risk of overshoot)
  payout_high_fraction: 0.85
  # Steps of slack before dormant booster arming becomes urgent (0 = must arm immediately)
  arming_urgency_horizon: 1
  # Default max connected component size for terminal dead boards when signature
  # doesn't specify — prevents visible near-cluster groupings on dead spins
  terminal_dead_default_max_component: 4
  # Maximum hypothetical boards a strategy may evaluate per step (computation budget)
  max_forward_simulations_per_step: 10
  # Cap on strategic cells per step intent — prevents over-constraining future steps
  # SeedPlanner typically places 5-15 cells; 16 gives headroom without over-constraining WFC
  max_strategic_cells_per_step: 16
  # How many gravity-settle steps ahead strategies may chain-simulate (1 = immediate only)
  lookahead_depth: 2
